name: buildroot

# Build a generic Buildroot rootfs + toolchain for each supported m68k
# CPU variant, from upstream Buildroot source (see sources.repos).
#
# A single "download" job fetches every source tarball once into a
# shared BR2_DL_DIR and caches it; the per-CPU build jobs then reuse
# those downloads instead of each fetching their own copy, and the
# cache carries the tarballs over between pipeline runs.
#
# This workflow also builds qemu-system-m68k once and caches it - both
# the mainline build (the "qemu" job) and the m68k-testrobot fork used
# by the mvme147 target (the "qemu-fork" job) - so the per-target boot
# workflows that chain off this one just restore whichever binary they
# need instead of rebuilding QEMU.

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  BR2_DL_DIR: ${{ github.workspace }}/br-dl

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo scripts/install-buildroot-deps.sh

      - name: Fetch sources
        run: scripts/fetch-sources.sh

      - name: Cache Buildroot downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.BR2_DL_DIR }}
          key: br-dl-${{ hashFiles('sources.repos', 'configs/buildroot/*') }}
          restore-keys: br-dl-

      - name: Download all Buildroot sources
        run: |
          for cpu in 68030 68040; do
            scripts/download-buildroot-sources.sh "$cpu"
          done

  build:
    needs: download
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cpu: [68030, 68040]
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      # Cache the built rootfs image, keyed on the Buildroot version and
      # this CPU's defconfig.  On a hit the whole build below is skipped.
      - name: Cache Buildroot rootfs image
        id: rootfs
        uses: actions/cache@v4
        with:
          path: output/${{ matrix.cpu }}/images
          key: br-rootfs-${{ matrix.cpu }}-${{ hashFiles('sources.repos', format('configs/buildroot/m68k_{0}_defconfig', matrix.cpu)) }}

      - name: Install build dependencies
        if: steps.rootfs.outputs.cache-hit != 'true'
        run: sudo scripts/install-buildroot-deps.sh

      - name: Fetch sources
        if: steps.rootfs.outputs.cache-hit != 'true'
        run: scripts/fetch-sources.sh

      - name: Restore Buildroot downloads
        if: steps.rootfs.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.BR2_DL_DIR }}
          key: br-dl-${{ hashFiles('sources.repos', 'configs/buildroot/*') }}
          restore-keys: br-dl-

      - name: Build Buildroot (m68k ${{ matrix.cpu }})
        if: steps.rootfs.outputs.cache-hit != 'true'
        run: scripts/build-buildroot.sh ${{ matrix.cpu }}

      - name: Upload images
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-m68k-${{ matrix.cpu }}
          path: output/${{ matrix.cpu }}/images/
          if-no-files-found: error

  # Build qemu-system-m68k once and cache it, keyed on the QEMU pin
  # (sources.repos) and the configure flags (build-qemu.sh).  Target boot
  # workflows restore this binary rather than rebuilding QEMU.
  qemu:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Cache qemu-system-m68k
        id: qemu
        uses: actions/cache@v4
        with:
          path: output/qemu/qemu-system-m68k
          key: qemu-m68k-${{ hashFiles('sources.repos', 'scripts/build-qemu.sh') }}

      - name: Install build dependencies
        if: steps.qemu.outputs.cache-hit != 'true'
        run: sudo scripts/install-qemu-build-deps.sh

      - name: Fetch sources
        if: steps.qemu.outputs.cache-hit != 'true'
        run: scripts/fetch-sources.sh

      - name: Build qemu-system-m68k
        if: steps.qemu.outputs.cache-hit != 'true'
        run: scripts/build-qemu.sh

      - name: Upload qemu-system-m68k
        uses: actions/upload-artifact@v4
        with:
          name: qemu-system-m68k
          path: output/qemu/qemu-system-m68k
          if-no-files-found: error

  # Build the m68k-testrobot QEMU fork (for the mvme147 target, which
  # mainline QEMU doesn't support) the same way, keyed on the fork
  # manifest and the configure flags.  The mvme147 boot workflow restores
  # this rather than rebuilding it.  Note: a branch pin does not refresh
  # when the branch moves upstream; bump targets/mvme147/sources.repos to
  # force a rebuild.
  qemu-fork:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Cache qemu-system-m68k (fork)
        id: qemu
        uses: actions/cache@v4
        with:
          path: output/qemu-m68k-testrobot/qemu-system-m68k
          key: qemu-m68k-testrobot-${{ hashFiles('targets/mvme147/sources.repos', 'scripts/build-qemu.sh') }}

      - name: Install build dependencies
        if: steps.qemu.outputs.cache-hit != 'true'
        run: sudo scripts/install-qemu-build-deps.sh

      - name: Fetch the QEMU fork
        if: steps.qemu.outputs.cache-hit != 'true'
        run: scripts/fetch-sources.sh targets/mvme147/sources.repos

      - name: Build qemu-system-m68k (fork)
        if: steps.qemu.outputs.cache-hit != 'true'
        run: scripts/build-qemu.sh qemu-m68k-testrobot

      - name: Upload qemu-system-m68k (fork)
        uses: actions/upload-artifact@v4
        with:
          name: qemu-system-m68k-fork
          path: output/qemu-m68k-testrobot/qemu-system-m68k
          if-no-files-found: error

  # Build the mvme147 U-Boot (from the m68k-testrobot U-Boot fork) and
  # cache the SPL, keyed on the fork manifest and the build script.  The
  # mvme147 boot workflow restores the SPL, wraps it as a ROMboot module
  # and boots it.  Same branch-pin caveat as the QEMU fork.
  u-boot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Cache U-Boot SPL (mvme147)
        id: uboot
        uses: actions/cache@v4
        with:
          path: output/u-boot-m68k-testrobot/spl/u-boot-spl.bin
          key: uboot-mvme147-${{ hashFiles('targets/mvme147/u-boot.repos', 'scripts/build-uboot.sh') }}

      - name: Install build dependencies
        if: steps.uboot.outputs.cache-hit != 'true'
        run: sudo scripts/install-uboot-deps.sh

      - name: Fetch the U-Boot fork
        if: steps.uboot.outputs.cache-hit != 'true'
        run: scripts/fetch-sources.sh targets/mvme147/u-boot.repos

      - name: Build U-Boot (mvme147)
        if: steps.uboot.outputs.cache-hit != 'true'
        run: scripts/build-uboot.sh u-boot-m68k-testrobot mvme147_defconfig

      - name: Upload U-Boot SPL
        uses: actions/upload-artifact@v4
        with:
          name: u-boot-mvme147-spl
          path: output/u-boot-m68k-testrobot/spl/u-boot-spl.bin
          if-no-files-found: error
