name: mvme147

# Boot the Motorola MVME147 into U-Boot via 147Bug's ROMboot.  MVME147 is
# not in mainline QEMU, so it runs on the m68k-testrobot QEMU fork, and it
# boots the m68k-testrobot U-Boot SPL; both are built and cached by the
# buildroot workflow (like the mainline QEMU).
#
# Like the other targets this runs *after* the buildroot workflow and
# restores those binaries from its caches; it then downloads the 147Bug
# ROM, wraps the SPL as a ROMboot module, and boots.  It doesn't use
# Buildroot or the mainline QEMU.

on:
  workflow_run:
    workflows: [buildroot]
    types: [completed]
  workflow_dispatch:

jobs:
  boot:
    runs-on: ubuntu-latest
    # On a workflow_run trigger, only proceed if the buildroot run passed
    # (so the fork qemu cache exists); a manual dispatch always runs.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      # Reuse the fork's qemu-system-m68k the buildroot workflow built and
      # cached (same key) rather than rebuilding QEMU here.
      - name: Restore qemu-system-m68k (fork)
        uses: actions/cache/restore@v4
        with:
          path: output/qemu-m68k-testrobot/qemu-system-m68k
          key: qemu-m68k-testrobot-${{ hashFiles('targets/mvme147/sources.repos', 'scripts/build-qemu.sh') }}
          fail-on-cache-miss: true

      - name: Restore U-Boot (mvme147)
        uses: actions/cache/restore@v4
        with:
          path: |
            output/u-boot-m68k-testrobot/spl/u-boot-spl.bin
            output/u-boot-m68k-testrobot/u-boot.img
          key: uboot-mvme147-v2-${{ hashFiles('targets/mvme147/u-boot.repos', 'scripts/build-uboot.sh') }}
          fail-on-cache-miss: true

      # qemu runtime libraries (to run the restored binary), the kernel
      # build toolchain, and the disk tools used to build the FAT16 boot
      # disk; python3 (for the NVRAM image) comes with the qemu deps.  The
      # SPL is already a ROMboot module, so no cross toolchain is needed to
      # assemble it.
      - name: Install dependencies
        run: |
          sudo scripts/install-qemu-build-deps.sh
          sudo scripts/install-linux-deps.sh
          sudo apt-get install -y --no-install-recommends dosfstools mtools

      - name: Fetch the Linux fork
        run: scripts/fetch-sources.sh targets/mvme147/linux.repos

      - name: Build Linux (mvme147)
        run: scripts/build-linux.sh mvme147

      # Cache the downloaded ROM so we don't hit bitsavers every run.
      - name: Cache 147Bug ROM
        id: rom
        uses: actions/cache@v4
        with:
          path: output/roms
          key: rom-mvme147-${{ hashFiles('targets/mvme147/target.conf') }}

      - name: Download the 147Bug ROM
        if: steps.rom.outputs.cache-hit != 'true'
        run: scripts/fetch-rom.sh mvme147

      - name: Assemble the ROMboot artifacts
        run: scripts/build-mvme147-boot.sh

      - name: Boot the MVME147 (ROMboot -> U-Boot -> Linux)
        run: scripts/boot-target.sh mvme147

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mvme147-boot-log
          path: output/mvme147-boot.log
          if-no-files-found: warn
