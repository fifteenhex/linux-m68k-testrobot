name: q800

# Boot the Quadra 800: build qemu-system-m68k and a Quadra 800 kernel,
# then boot with QEMU's direct kernel load (-kernel) and the 68040
# Buildroot rootfs as an initramfs, and check it boots.
#
# This runs *after* the buildroot workflow so the rootfs is built once
# and shared (via its cache) by every target, instead of each target
# rebuilding Buildroot.  The rootfs is restored from that cache here.

on:
  workflow_run:
    workflows: [buildroot]
    types: [completed]
  workflow_dispatch:

jobs:
  boot:
    runs-on: ubuntu-latest
    # On a workflow_run trigger, only proceed if the buildroot run passed
    # (so its rootfs cache exists); a manual dispatch always runs.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      # Reuse the rootfs the buildroot workflow built and cached (same
      # key).  Fail loudly if it is missing rather than rebuilding it.
      - name: Restore Buildroot rootfs (68040)
        uses: actions/cache/restore@v4
        with:
          path: output/68040/images
          key: br-rootfs-68040-${{ hashFiles('sources.repos', 'configs/buildroot/m68k_68040_defconfig') }}
          fail-on-cache-miss: true

      # Reuse the qemu-system-m68k the buildroot workflow built and
      # cached (same key) rather than rebuilding QEMU here.
      - name: Restore qemu-system-m68k
        uses: actions/cache/restore@v4
        with:
          path: output/qemu/qemu-system-m68k
          key: qemu-m68k-${{ hashFiles('sources.repos', 'scripts/build-qemu.sh') }}
          fail-on-cache-miss: true

      - name: Install dependencies
        run: |
          sudo scripts/install-qemu-build-deps.sh
          sudo scripts/install-linux-deps.sh

      - name: Fetch sources
        run: scripts/fetch-sources.sh

      - name: Build Linux for the Quadra 800
        run: scripts/build-linux.sh q800

      - name: Boot the Quadra 800 (kernel-direct)
        run: scripts/boot-target.sh q800

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: q800-boot-log
          path: output/q800-boot.log
          if-no-files-found: warn
