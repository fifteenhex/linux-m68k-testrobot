name: q800

# Build qemu-system-m68k, a Quadra 800 kernel and a Buildroot rootfs
# (68040), then boot the machine with QEMU's direct kernel load (-kernel)
# and the rootfs as an initramfs, and check it boots.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  boot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      # The q800 boots the 68040 Buildroot rootfs.  Reuse the image
      # cached by the buildroot workflow (same key); build it here only
      # on a cache miss.
      - name: Cache Buildroot rootfs (68040)
        id: rootfs
        uses: actions/cache@v4
        with:
          path: output/68040/images
          key: br-rootfs-68040-${{ hashFiles('sources.repos', 'configs/buildroot/m68k_68040_defconfig') }}

      - name: Install dependencies
        run: |
          sudo scripts/install-qemu-build-deps.sh
          sudo scripts/install-linux-deps.sh

      - name: Fetch sources
        run: scripts/fetch-sources.sh

      - name: Build Buildroot rootfs (68040)
        if: steps.rootfs.outputs.cache-hit != 'true'
        run: |
          sudo scripts/install-buildroot-deps.sh
          scripts/build-buildroot.sh 68040

      - name: Build qemu-system-m68k
        run: scripts/build-qemu.sh

      - name: Build Linux for the Quadra 800
        run: scripts/build-linux.sh q800

      - name: Boot the Quadra 800 (kernel-direct)
        run: scripts/boot-target.sh q800

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: q800-boot-log
          path: output/q800-boot.log
          if-no-files-found: warn
