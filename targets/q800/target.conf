# Quadra 800 target definition (sourced by scripts/boot-target.sh).

# QEMU machine name.
QEMU_MACHINE="q800"

# How the target is booted.  For now only direct kernel load (-kernel);
# booting through the full boot process (ROM / bootloader) comes later.
BOOT_METHOD="kernel-direct"

# Kernel command line.  console=ttyS0 is the Mac SCC serial that
# CONFIG_SERIAL_PMACZILOG_CONSOLE drives, which QEMU exposes as serial0.
KERNEL_APPEND="console=ttyS0"

# String that confirms a successful boot.  With no root filesystem the
# kernel boots all the way to the point of mounting root and stops there,
# which is enough to prove the -kernel direct boot works.  A real
# userspace boot arrives with the full boot-process milestone.
BOOT_EXPECT="Unable to mount root fs"

# Give up if the expected string has not appeared after this long.
BOOT_TIMEOUT="120"
