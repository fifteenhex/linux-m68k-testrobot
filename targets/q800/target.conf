# Quadra 800 target definition (sourced by scripts/boot-target.sh).

# QEMU machine name.
QEMU_MACHINE="q800"

# How the machine is booted.  For now only direct kernel load (-kernel);
# booting through the full boot process (ROM / bootloader) comes later.
BOOT_METHOD="kernel-direct"

# Root filesystem: the Quadra 800 is a 68040, so it boots the Buildroot
# rootfs built for the 68040, as an lz4-compressed initramfs.  The boot
# depends on this image being available.
BUILDROOT_CPU="68040"
ROOTFS_METHOD="initramfs"

# Kernel command line.  console=ttyS0 is the Mac SCC serial that
# CONFIG_SERIAL_PMACZILOG_CONSOLE drives, which QEMU exposes as serial0.
KERNEL_APPEND="console=ttyS0"

# String that confirms a successful boot: Buildroot starts a getty on
# the console, so reaching its login prompt proves a full boot to
# userspace.
BOOT_EXPECT="login:"

# Give up if the expected string has not appeared after this long.
BOOT_TIMEOUT="180"

# The Quadra 800 has a Mac framebuffer (QEMU nubus-macfb, driven by
# CONFIG_FB_MAC + fbcon), so its boot can be recorded to a GIF with
# scripts/record-target.sh.
VIDEO="1"
