# Motorola MVME147 target definition (sourced by scripts/boot-target.sh).
#
# A 68030 VME single-board computer.  MVME147 is not supported by
# mainline QEMU, so this target uses the m68k-testrobot QEMU fork
# (https://github.com/fifteenhex/qemu, branch m68k-testrobot), fetched
# via targets/mvme147/sources.repos and built as output/qemu-m68k-testrobot/.
#
# It boots U-Boot (from the matching m68k-testrobot U-Boot fork) via
# 147Bug's ROMboot: 147Bug runs, finds the SPL wrapped as a "BOOT" module
# in ROM bank 2, and jumps to it; the SPL then tries to load full U-Boot
# over SCSI.  For now we only check it gets that far.

QEMU_MACHINE="mvme147"

# Boot/run with the QEMU fork rather than the mainline build.
QEMU_SOURCE="qemu-m68k-testrobot"

# ROMboot the U-Boot SPL.  scripts/build-mvme147-boot.sh produces the
# ROM-bank-2 module, the ROMboot-enabled NVRAM and the SCSI disk under
# output/mvme147/; the 147Bug ROM itself is fetched from ROM_URL.
BOOT_METHOD="romboot"
ROM_URL="http://www.bitsavers.org/pdf/motorola/VME/MVME147/firmware/147/147bug2.5-combined.bin"

# The SPL prints this once ROMboot has handed control to it and it starts
# looking for U-Boot on SCSI (u-boot calls the SCSI transport "SATA").
BOOT_EXPECT="Trying to boot from SATA"
BOOT_TIMEOUT="120"
