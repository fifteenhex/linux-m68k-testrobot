# Motorola MVME147 target definition (sourced by scripts/boot-target.sh).
#
# A 68030 VME single-board computer.  MVME147 is not supported by
# mainline QEMU, so this target uses the m68k-testrobot QEMU fork
# (https://github.com/fifteenhex/qemu, branch m68k-testrobot), fetched
# via targets/mvme147/sources.repos and built as output/qemu-m68k-testrobot/.
#
# It boots U-Boot (from the matching m68k-testrobot U-Boot fork) via
# 147Bug's ROMboot: 147Bug runs, finds the SPL "BOOT" module in ROM bank
# 2 and jumps to it; the SPL loads u-boot.img from the FAT16 SCSI disk and
# runs full U-Boot, which drops to its prompt.

QEMU_MACHINE="mvme147"

# Boot/run with the QEMU fork rather than the mainline build.
QEMU_SOURCE="qemu-m68k-testrobot"

# ROMboot the U-Boot SPL.  scripts/build-mvme147-boot.sh produces the
# ROM-bank-2 module, the ROMboot-enabled NVRAM and the FAT16 SCSI disk
# (with u-boot.img) under output/mvme147/; the 147Bug ROM itself is
# fetched from ROM_URL.
BOOT_METHOD="romboot"
ROM_URL="http://www.bitsavers.org/pdf/motorola/VME/MVME147/firmware/147/147bug2.5-combined.bin"

# Full U-Boot's interactive prompt: reaching it proves the SPL loaded
# u-boot.img off the disk and full U-Boot came up.
BOOT_EXPECT="mvme147 =>"
BOOT_TIMEOUT="180"

# Linux is built from the m68k-testrobot fork (fetched via
# targets/mvme147/linux.repos, checked out as src/linux-m68k-testrobot)
# using its in-tree mvme147_defconfig, rather than the shared mainline
# tree + a config fragment.  Booting it is not wired up yet.
LINUX_SOURCE="linux-m68k-testrobot"
LINUX_DEFCONFIG="mvme147_defconfig"
