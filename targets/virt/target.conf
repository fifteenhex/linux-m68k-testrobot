# m68k virt target definition (sourced by scripts/boot-target.sh).
#
# QEMU's pure-virtual m68k machine: goldfish TTY/RTC/PIC + virtio-mmio.
# CONFIG_VIRT selects the CPU (m68040), the goldfish TTY console and
# virtio-mmio, so targets/virt/linux.config only adds initramfs support.

# QEMU machine name.
QEMU_MACHINE="virt"

# How the machine is booted.  For now only direct kernel load (-kernel).
BOOT_METHOD="kernel-direct"

# Root filesystem: the virt machine defaults to a 68040 CPU, so it boots
# the 68040 Buildroot rootfs, as an lz4-compressed initramfs.  The boot
# depends on this image being available.
BUILDROOT_CPU="68040"
ROOTFS_METHOD="initramfs"

# Kernel command line.  The console is the goldfish TTY (ttyGF0), which
# QEMU wires to the first serial port (serial0).
KERNEL_APPEND="console=ttyGF0"

# String that confirms a successful boot: Buildroot starts a getty on
# the console, so reaching its login prompt proves a full boot to
# userspace.
BOOT_EXPECT="login:"

# Give up if the expected string has not appeared after this long.
BOOT_TIMEOUT="180"
